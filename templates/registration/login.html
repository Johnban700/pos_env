<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mall POS Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">
    <div class="max-w-md w-full bg-zinc-900 p-10 rounded-3xl">
        <div class="text-center mb-10">
            <h1 class="text-6xl mb-3">🛒</h1>
            <h2 class="text-3xl font-bold">Mall POS System</h2>
            <p class="text-zinc-400 mt-2">Advanced Cashier Terminal</p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="block text-sm text-zinc-400 mb-2">Username</label>
                <input type="text" name="username" required autofocus
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-emerald-500">
            </div>

            <div>
                <label class="block text-sm text-zinc-400 mb-2">Password</label>
                <input type="password" name="password" required
                       class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-emerald-500">
            </div>

            <button type="submit" 
                    class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-3xl text-xl font-semibold transition">
                SIGN IN TO POS
            </button>
        </form>

        {% if form.errors %}
        <p class="text-red-500 text-center mt-6">❌ Invalid username or password</p>
        {% endif %}
    </div>
</body>
</html>
